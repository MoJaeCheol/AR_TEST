<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MindAR WebAR</title>
    
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <script>
      document.addEventListener("DOMContentLoaded", function() {
        const target = document.querySelector('[mindar-image-target]');
        const video = document.querySelector('#myVideo');

        target.addEventListener("targetFound", event => {
          console.log("시나모롤 인식 성공!");
          video.play();
        });

        target.addEventListener("targetLost", event => {
          console.log("인식 끊김");
          video.pause();
        });
      });
    </script>
  </head>
  <body>
    <a-scene mindar-image="imageTargetSrc: targets.mind; uiLoading: no; uiScanning: no;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="myVideo" src="02_1.mp4" preload="auto" loop muted playsinline webkit-playsinline></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-video src="#myVideo" position="0 0 0" height="1" width="1.5" rotation="0 0 0"></a-video>
      </a-entity>
      
    </a-scene>
  </body>
</html>
