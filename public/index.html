<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WebAR Touch to Start</title>
    
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <style>
      /* 🌟 [수정됨] 화면을 꽉 채우는 터치 유도 로딩 화면 */
      #custom-loader {
        position: fixed;
        top: 0; left: 0;
        width: 100vw; height: 100vh; /* 화면 전체 너비와 높이 */
        
        /* 1. 배경 이미지 설정 (본인의 이미지 파일명으로 변경하세요!) */
        background-image: url('loading.png'); 
        background-size: cover; /* 이미지가 찌그러지지 않고 화면을 꽉 채움 */
        background-position: center; /* 이미지를 중앙에 배치 */
        background-repeat: no-repeat;
        
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-end; /* 안내 문구를 화면 아래쪽으로 배치 */
        padding-bottom: 200px; /* 아래에서 80px 띄움 */
        
        z-index: 9999;
        cursor: pointer; /* 누를 수 있다는 느낌을 줌 */
        transition: opacity 0.5s ease; /* 부드럽게 사라지는 효과 */
      }

      /* 터치 유도 안내 문구 디자인 */
      .start-text {
        color: #ffffff;
        background-color: rgba(0, 0, 0, 0.6); /* 반투명 검은색 배경 */
        padding: 12px 24px;
        border-radius: 30px;
        font-family: sans-serif;
        font-weight: bold;
        font-size: 16px;
        animation: pulse 1.5s infinite; /* 깜빡이는 애니메이션 */
      }

      @keyframes pulse {
        0% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.05); opacity: 0.8; }
        100% { transform: scale(1); opacity: 1; }
      }
    </style>

    <script>
      // 완벽하게 작동하는 크로마키 쉐이더 유지
      AFRAME.registerShader('chromakey', {
        schema: {
          src: { type: 'map', is: 'uniform' },
          color: { type: 'color', is: 'uniform', default: '#00FF00' },
          threshold: { type: 'number', is: 'uniform', default: 0.2 }
        },
        vertexShader: `
          varying vec2 vUv;
          void main() {
            vUv = uv;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
          }
        `,
        fragmentShader: `
          uniform sampler2D src;
          uniform vec3 color;
          uniform float threshold;
          varying vec2 vUv;
          
          void main() {
            vec4 texColor = texture2D(src, vUv);
            float diff = distance(texColor.rgb, color);
            if (diff < threshold) {
              discard;
            } else {
              gl_FragColor = texColor;
            }
          }
        `
      });

      document.addEventListener("DOMContentLoaded", function() {
        const loader = document.getElementById('custom-loader');
        const target = document.querySelector('[mindar-image-target]');
        const video = document.querySelector('#myVideo');

        // 🌟 [핵심] 화면을 터치하면 비디오 엔진을 깨우고 로딩 화면을 지웁니다
        loader.addEventListener('click', function() {
          console.log("터치 인식! 비디오 엔진 잠금 해제");
          
          // 비디오 강제 1회 재생 후 정지 (iOS/크롬 보안 뚫기)
          video.play().then(() => {
            video.pause();
          }).catch(err => console.log("비디오 대기 중..."));

          // 로딩 화면 부드럽게 숨기기
          loader.style.opacity = '0';
          setTimeout(() => {
            loader.style.display = 'none';
          }, 500);
        });

        // 마커 인식 시 재생
        target.addEventListener("targetFound", () => {
          console.log("시나모롤 인식 성공! 재생");
          video.play();
        });

        // 마커 놓침 시 일시정지
        target.addEventListener("targetLost", () => {
          console.log("인식 끊김");
          video.pause();
        });
      });
    </script>
  </head>

  <body style="margin: 0; overflow: hidden;">
    
    <div id="custom-loader">
      <div class="start-text">화면을 터치해서 AR 시작하기</div>
    </div>

    <a-scene 
      mindar-image="imageTargetSrc: targets.mind; uiLoading: no; uiScanning: no;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="myVideo" src="03_green.mp4" crossorigin="anonymous" preload="auto" loop muted playsinline webkit-playsinline></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-plane 
          material="shader: chromakey; src: #myVideo; color: #00FF00; threshold: 0.2; transparent: true;" 
          width="1.5" height="1" 
          position="0 0 0" 
          rotation="0 0 0">
        </a-plane>
      </a-entity>
      
    </a-scene>
  </body>
</html>
